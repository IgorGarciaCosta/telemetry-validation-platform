AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Telemetry API - Stack Serverless

Globals:
  Function:
    Timeout: 10
    MemorySize: 256

Resources:
  # --- API (Producer) ---
  TelemetryApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./Api
      Handler: Api
      Runtime: dotnet8
      Architectures:
        - x86_64
      Events:
        ProxyResource:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
            ApiId: !Ref TelemetryHttpApi
        RootResource:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY
            ApiId: !Ref TelemetryHttpApi
      Environment:
        Variables:
          ASPNETCORE_ENVIRONMENT: Production
          SQS_QUEUE_URL: !Ref TelemetryQueue
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt TelemetryQueue.QueueName

  # --- WORKER (Consumer) ---
  TelemetryWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./Api
      Handler: Api::Api.Worker.EventProcessor::FunctionHandler
      Runtime: dotnet8
      Architectures:
        - x86_64
      # Trigger da Fila
      Events:
        MySQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt TelemetryQueue.Arn
            BatchSize: 10
      # --- CORREÇÃO AQUI: Environment e Policies DENTRO de Properties ---
      Environment:
        Variables:
          METRICS_TABLE_NAME: !Ref MetricsTable
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt TelemetryQueue.QueueName
        - DynamoDBCrudPolicy:
            TableName: !Ref MetricsTable
      # ------------------------------------------------------------------

  TelemetryHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Description: "HTTP API para Telemetry Platform"

  # --- Tabelas DynamoDB ---
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Events
      AttributeDefinitions:
        - AttributeName: Id
          AttributeType: S
      KeySchema:
        - AttributeName: Id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  MetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Metrics
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  # --- Fila SQS ---
  TelemetryQueue:
    Type: AWS::SQS::Queue

Outputs:
  WebApiUrl:
    Description: URL da API
    Value: !Sub "https://${TelemetryHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  QueueUrl:
    Description: URL da Fila SQS
    Value: !Ref TelemetryQueue
